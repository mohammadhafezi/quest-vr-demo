<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quest VR Scene</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>
</head>
<body style="margin:0;">

  <a-scene background="color: #ECECEC">

    <!-- Assets -->
    <a-assets>
      <img id="sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg">
    </a-assets>

    <!-- 360 skybox -->
    <a-sky src="#sky" rotation="0 -130 0"></a-sky>

    <!-- Floor -->
    <a-plane rotation="-90 0 0" width="20" height="20" color="#4CAF50" shadow></a-plane>

    <!-- Interactive floating cube -->
    <a-box id="cube" position="0 1.5 -3" rotation="0 45 0" color="#4CC3D9"
           shadow
           animation="property: rotation; to: 0 405 0; loop: true; dur: 8000; easing: linear"
           class="clickable">
      <a-animation attribute="scale"
                    begin="click"
                    dur="200"
                    direction="alternate"
                    to="1.3 1.3 1.3"></a-animation>
    </a-box>

    <!-- Interactive sphere that changes color on click -->
    <a-sphere id="sphere" position="2 1.5 -4" radius="0.6" color="#EF2D5E" shadow class="clickable"></a-sphere>

    <!-- Interactive cylinder -->
    <a-cylinder id="cylinder" position="-2 1 -4" radius="0.5" height="1.5" color="#FFC65D" shadow class="clickable"></a-cylinder>

    <!-- Text label -->
    <a-text value="Look around and point at the shapes to interact!" position="0 3 -4" align="center" width="6" color="#222"></a-text>

    <!-- Camera rig with movement (WASD on desktop, thumbstick on Quest controllers) and cursor for gaze/point interaction -->
    <a-entity id="rig" movement-controls position="0 0 2">
      <a-entity camera position="0 1.6 0" look-controls>
        <a-entity cursor="fuse: false"
                   position="0 0 -1"
                   geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                   material="color: white; shader: flat"
                   raycaster="objects: .clickable"></a-entity>
      </a-entity>
      <!-- Quest controllers for pointing/clicking and teleport-style movement -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
    </a-entity>

  </a-scene>

  <script>
    // Simple click interaction: cycle colors on click
    const colors = ['#4CC3D9', '#EF2D5E', '#FFC65D', '#7BC8A4', '#B983FF'];
    function cycleColor(el) {
      let i = 0;
      el.addEventListener('click', () => {
        i = (i + 1) % colors.length;
        el.setAttribute('color', colors[i]);
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      ['#cube', '#sphere', '#cylinder'].forEach(sel => {
        cycleColor(document.querySelector(sel));
      });
    });
  </script>

</body>
</html>
