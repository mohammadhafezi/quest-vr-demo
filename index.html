<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quest VR Scene</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin:0;">

  <a-scene background="color: #ECECEC">

    <a-assets>
      <img id="sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- 360 skybox -->
    <a-sky src="#sky" rotation="0 -130 0"></a-sky>

    <!-- Floor -->
    <a-plane rotation="-90 0 0" width="20" height="20" color="#4CAF50" shadow></a-plane>

    <!-- Interactive floating cube -->
    <a-box id="cube" position="0 1.5 -3" rotation="0 45 0" color="#4CC3D9"
           shadow
           animation="property: rotation; to: 0 405 0; loop: true; dur: 8000; easing: linear"
           class="clickable"></a-box>

    <!-- Interactive sphere -->
    <a-sphere id="sphere" position="2 1.5 -4" radius="0.6" color="#EF2D5E" shadow class="clickable"></a-sphere>

    <!-- Interactive cylinder -->
    <a-cylinder id="cylinder" position="-2 1 -4" radius="0.5" height="1.5" color="#FFC65D" shadow class="clickable"></a-cylinder>

    <!-- Text label -->
    <a-text value="Look around and point at the shapes to interact!" position="0 3 -4" align="center" width="6" color="#222"></a-text>

    <!-- Camera rig: WASD movement (core A-Frame) + look-controls + gaze cursor -->
    <a-entity id="rig" position="0 0 2" wasd-controls>
      <a-entity camera position="0 1.6 0" look-controls>
        <a-entity cursor="fuse: false"
                   position="0 0 -1"
                   geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                   material="color: white; shader: flat"
                   raycaster="objects: .clickable"></a-entity>
      </a-entity>
    </a-entity>

    <!-- Quest controllers for pointing/clicking (core A-Frame components) -->
    <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>

  </a-scene>

  <script>
    var colors = ['#4CC3D9', '#EF2D5E', '#FFC65D', '#7BC8A4', '#B983FF'];
    function cycleColor(el) {
      var i = 0;
      el.addEventListener('click', function () {
        i = (i + 1) % colors.length;
        el.setAttribute('color', colors[i]);
      });
    }
    window.addEventListener('DOMContentLoaded', function () {
      ['#cube', '#sphere', '#cylinder'].forEach(function (sel) {
        cycleColor(document.querySelector(sel));
      });
    });
  </script>

</body>
</html>
